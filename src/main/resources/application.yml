server:
  port: ${SERVER_PORT:8761}

spring:
  application:
    name: discovery-service
  security:
    user:
      name: ${EUREKA_USER:eureka-admin}
      password: ${EUREKA_PASSWORD:dev-only-pass-change-me}
      roles: EUREKA_CLIENT

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
