server:
  port: ${SERVER_PORT:8761}

spring:
  application:
    name: discovery-service
  security:
    user:
      name: ${EUREKA_USER:eureka-admin}
      password: ${EUREKA_PASSWORD:dev-only-pass-change-me}
      roles: EUREKA_CLIENT

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

# ============================================================================
# Observability (Round 10) — management endpoints + Micrometer + OTel SDK
# discovery-service (Eureka server) tambien expone metricas y traces:
# - /actuator/health (compose healthcheck)
# - /actuator/prometheus (metricas JVM + Eureka registry size, heartbeats)
# - tracing de registrations + heartbeat queries entrantes
# ============================================================================
management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9100}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,httpexchanges
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING:1.0}
    enabled: true
  observations:
    annotations:
      enabled: true

logging:
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
  level:
    io.opentelemetry: ${LOG_LEVEL_OTEL:INFO}
    io.micrometer.tracing: ${LOG_LEVEL_TRACING:INFO}
